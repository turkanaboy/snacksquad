name: Verify

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm exec -- supabase start
      - run: npm exec -- supabase db reset
      - run: npm exec -- supabase test db
      - run: npm exec -- supabase db lint --fail-on error
      - if: always()
        run: npm exec -- supabase stop --no-backup
